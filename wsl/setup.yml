- hosts: localhost
  connection: local

  tasks:
      - name: WSL System Setup
        block:
            - name: Create VSCode config directory
              ansible.builtin.file:
                  path: '{{ ansible_env.HOME }}/.config/Code/User'
                  state: directory
                  mode: '0755'

            - name: Copy VSCode settings
              ansible.builtin.copy:
                  src: '../vscode/settings.json'
                  dest: '{{ ansible_env.HOME }}/.config/Code/User/settings.json'
                  mode: '0644'

            - name: Install VSCode extensions
              ansible.builtin.shell: |
                  CODE_CLI=$(find "$HOME/.vscode-server/bin" -name "code" -path "*/remote-cli/*" 2>/dev/null | sort -r | head -1)
                  if [ -z "$CODE_CLI" ]; then
                      echo "VSCode Server CLI not found, skipping"
                      exit 0
                  fi
                  while IFS= read -r extension; do
                      "$CODE_CLI" --install-extension "$extension" --force
                  done < ../vscode/extensions.txt
              changed_when: false
        when: "'microsoft' in ansible_kernel | lower or 'wsl' in ansible_kernel | lower"
