- import_playbook: ./debian/setup.yml
- import_playbook: ./wsl/setup.yml

- hosts: localhost
  connection: local
  become: true

  vars_prompt:
      - name: git_user_email
        prompt: 'Enter your git email'
        private: no

  tasks:
      # --- Cross-Platform / User Config Tasks ---
      - name: Ensure .bash_aliases is sourced in .bashrc
        ansible.builtin.blockinfile:
            path: '{{ ansible_env.HOME }}/.bashrc'
            marker: '# {mark} ANSIBLE MANAGED BLOCK: SHARED ALIASES'
            block: |
                if [ -f ~/.bash_aliases ]; then
                    . ~/.bash_aliases
                fi
            create: yes

      - name: Copy configs files to home
        ansible.builtin.copy:
            src: ./home/
            dest: '{{ ansible_env.HOME }}'
            owner: '{{ ansible_user_id }}'
            group: '{{ ansible_user_gid }}'
            mode: '0755'

      - name: Configure git email
        community.general.git_config:
            name: 'user.email'
            value: '{{ git_user_email }}'
            scope: global
            state: present
        become: no

      # --- VSCode Setup (Native Linux) ---
      - name: Create VSCode config directory
        ansible.builtin.file:
            path: '{{ ansible_env.HOME }}/.config/Code/User'
            state: directory
            mode: '0755'
        become: yes
        become_user: '{{ ansible_user_id }}'

      - name: Copy VSCode settings
        ansible.builtin.copy:
            src: ./vscode/settings.json
            dest: '{{ ansible_env.HOME }}/.config/Code/User/settings.json'
            mode: '0644'
        become: yes
        become_user: '{{ ansible_user_id }}'

      - name: Install VSCode extensions
        ansible.builtin.shell: |
            while IFS= read -r extension; do
                /usr/bin/code --install-extension "$extension" --force
            done < {{ playbook_dir }}/vscode/extensions.txt
        become: yes
        become_user: '{{ ansible_user_id }}'
        changed_when: false
        ignore_errors: yes
